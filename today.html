<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8">
<title>今日のメモ</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
    max-width: 480px;
    margin: 40px auto;
    padding: 0 16px;
    color: #222;
  }
  h1 {
    font-size: 16px;
    color: #888;
    font-weight: normal;
    margin-bottom: 4px;
  }
  .status {
    font-size: 13px;
    color: #999;
    margin-bottom: 28px;
    line-height: 1.6;
    border-left: 3px solid #ddd;
    padding-left: 10px;
  }
  .task {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    background: #fafafa;
  }
  .task input[type="checkbox"] {
    margin-top: 3px;
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }
  .task label {
    flex: 1;
    cursor: pointer;
  }
  .task .time {
    display: block;
    font-size: 11px;
    color: #aaa;
    margin-top: 2px;
  }
  .rx-group {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .rx {
    font-size: 11px;
    color: #999;
    background: none;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 3px 8px;
    cursor: pointer;
  }
  .rx.selected[data-v="good"] { background: #e6f5ea; border-color: #9bd4ab; color: #2e7d42; }
  .rx.selected[data-v="neutral"] { background: #eee; border-color: #ccc; color: #555; }
  .rx.selected[data-v="bad"] { background: #fbe9e9; border-color: #e8a3a3; color: #b03333; }
  textarea {
    width: 100%;
    height: 70px;
    margin-top: 24px;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    resize: vertical;
    box-sizing: border-box;
  }
  .label-small {
    font-size: 12px;
    color: #999;
    margin-top: 24px;
    margin-bottom: 4px;
  }
  .save-status {
    position: fixed;
    top: 10px;
    right: 14px;
    font-size: 11px;
    color: #bbb;
  }
</style>
</head>
<body>

  <div class="save-status" id="saveStatus">保存中…</div>
  <h1>2026-07-20</h1>
  <div class="status">
    昨日は「じっくり眺める」だけ実行できていて、音楽と趣味の提案にも良い反応がありました。新しく借りたスペースの話も踏まえ、今日はものづくりや空間まわりのタスクも少し混ぜています。
  </div>

  <div class="task">

    </label>
    <div class="rx-group">
      <button type="button" class="rx" data-v="good">😊</button>
      <button type="button" class="rx selected" data-v="neutral">😐</button>
      <button type="button" class="rx" data-v="bad">😕</button>
    </div>
  </div>

  <div class="task">
    <input type="checkbox" id="t2">
    <label for="t2">
      部屋にある植物や小物を1つ選んで、ほこりをそっと拭き取ってみる
      <span class="time">2分・植物</span>
    </label>
    <div class="rx-group">
      <button type="button" class="rx" data-v="good">😊</button>
      <button type="button" class="rx" data-v="neutral">😐</button>
      <button type="button" class="rx" data-v="bad">😕</button>
    </div>
  </div>

  <div class="task">
    <input type="checkbox" id="t3">
    <label for="t3">
      お茶やコーヒーなど好きな香りのものを1つ選んで、口をつける前に香りだけをゆっくり楽しんでみる
      <span class="time">2分・香り</span>

    <div class="rx-group">
      <button type="button" class="rx" data-v="good">😊</button>
      <button type="button" class="rx" data-v="neutral">😐</button>
      <button type="button" class="rx" data-v="bad">😕</button>
    </div>
  </div>

  <div class="task">
    <input type="checkbox" id="t4">
    <label for="t4">
      余っている端材や道具を1つ手に取って、10分だけ試しに何か小さく作ってみる(完成させなくてOK)
      <span class="time">10分・試作</span>
    </label>
    <div class="rx-group">
      <button type="button" class="rx" data-v="good">😊</button>
      <button type="button" class="rx" data-v="neutral">😐</button>
      <button type="button" class="rx" data-v="bad">😕</button>

  </div>

  <div class="task">
    <input type="checkbox" id="t5">
    <label for="t5">
      自分でなぞなぞやクイズを1つ考えて、メモに書き留めておく
      <span class="time">3分・ことば遊び</span>
    </label>
    <div class="rx-group">
      <button type="button" class="rx" data-v="good">😊</button>
      <button type="button" class="rx" data-v="neutral">😐</button>
      <button type="button" class="rx" data-v="bad">😕</button>
    </div>
  </div>

  <div class="label-small">今日のひとこと(任意)</div>
  <textarea placeholder="今日感じたこと、気になったこと、要望など、なんでも">そりゃ置くものはリスト作りますよ！
けど今日は忙しかった。

本当二一人になれる時間なんてないのかもしれない…
</textarea>

<script>
document.querySelectorAll('.rx').forEach(function(btn){
  btn.addEventListener('click', function(){
    var group = btn.parentElement.querySelectorAll('.rx');
    group.forEach(function(b){ b.classList.remove('selected'); });
    btn.classList.add('selected');
    scheduleSave();
  });
});

// ── 自動保存(GitHub Contents APIへの書き戻し) ──
var GH_OWNER = 'alinxcy';
var GH_REPO = 'nantotonomemo';
var GH_PATH = 'today.html';
var GH_BRANCH = 'main';
var statusEl = document.getElementById('saveStatus');
var saveTimer = null;
var isSaving = false;
var pendingRetry = false;

function getToken() {
  var t = localStorage.getItem('gh_pat');
  if (!t) {
    t = prompt('GitHubのPersonal Access Token(contents:write, このリポジトリのみ)を入力してください');
    if (t) localStorage.setItem('gh_pat', t);
  }
  return t;
}

function serializeCurrentState() {
  document.querySelectorAll('.task input[type="checkbox"]').forEach(function(cb){
    if (cb.checked) cb.setAttribute('checked', ''); else cb.removeAttribute('checked');
  });
  var ta = document.querySelector('textarea');
  if (ta) ta.textContent = ta.value;
  return '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
}

function scheduleSave() {
  clearTimeout(saveTimer);
  statusEl.textContent = '保存待ち…';
  saveTimer = setTimeout(function(){ saveState(0); }, 1000);
}

function saveState(attempt) {
  attempt = attempt || 0;
  if (isSaving) { pendingRetry = true; return; }
  isSaving = true;
  var token = getToken();
  if (!token) { statusEl.textContent = 'トークン未設定'; isSaving = false; return; }
  statusEl.textContent = '保存中…';
  var api = 'https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/' + GH_PATH;

  fetch(api + '?ref=' + GH_BRANCH + '&_=' + Date.now(), {
    cache: 'no-store',
    headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json' }
  })
  .then(function(res){ return res.json(); })
  .then(function(current){
    var content = serializeCurrentState();
    var body = {
      message: '自動保存: today.html更新',
      content: btoa(unescape(encodeURIComponent(content))),
      sha: current.sha,
      branch: GH_BRANCH
    };
    return fetch(api, {
      method: 'PUT',
      headers: {
        'Authorization': 'Bearer ' + token,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
  })
  .then(function(res){
    isSaving = false;
    if (res.ok) {
      statusEl.textContent = '保存済み ' + new Date().toLocaleTimeString('ja-JP');
      if (pendingRetry) { pendingRetry = false; saveState(0); }
    } else if (res.status === 409 && attempt < 3) {
      // shaの競合。最新shaを取り直して再試行する
      saveState(attempt + 1);
    } else if (res.status === 401) {
      localStorage.removeItem('gh_pat');
      statusEl.textContent = 'トークンが無効です。再読み込みして入力し直してください';
    } else {
      statusEl.textContent = '保存失敗(' + res.status + ')';
    }
  })
  .catch(function(){ isSaving = false; statusEl.textContent = '通信エラー'; });
}

document.querySelectorAll('.task input[type="checkbox"]').forEach(function(cb){
  cb.addEventListener('change', scheduleSave);
});
var taEl = document.querySelector('textarea');
if (taEl) taEl.addEventListener('input', scheduleSave);
</script>


</body></html>
