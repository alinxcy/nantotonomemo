<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>今日のメモ</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
    max-width: 480px;
    margin: 40px auto;
    padding: 0 16px;
    color: #222;
  }
  h1 {
    font-size: 16px;
    color: #888;
    font-weight: normal;
    margin-bottom: 4px;
  }
  .status {
    font-size: 13px;
    color: #999;
    margin-bottom: 28px;
    line-height: 1.6;
    border-left: 3px solid #ddd;
    padding-left: 10px;
  }
  .task {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    background: #fafafa;
  }
  .task input[type="checkbox"] {
    margin-top: 3px;
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }
  .task label {
    flex: 1;
    cursor: pointer;
  }
  .task .time {
    display: block;
    font-size: 11px;
    color: #aaa;
    margin-top: 2px;
  }
  .rx-group {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .rx {
    font-size: 11px;
    color: #999;
    background: none;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 3px 8px;
    cursor: pointer;
  }
  .rx.selected[data-v="good"] { background: #e6f5ea; border-color: #9bd4ab; color: #2e7d42; }
  .rx.selected[data-v="neutral"] { background: #eee; border-color: #ccc; color: #555; }
  .rx.selected[data-v="bad"] { background: #fbe9e9; border-color: #e8a3a3; color: #b03333; }
  textarea {
    width: 100%;
    height: 70px;
    margin-top: 24px;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    resize: vertical;
    box-sizing: border-box;
  }
  .label-small {
    font-size: 12px;
    color: #999;
    margin-top: 24px;
    margin-bottom: 4px;
  }
</style>
</head>
<body>

  <h1>2026-06-30</h1>
  <div class="status">
    最近、片付け系のタスクが続けて未消化です。今日は短時間で終わるものを多めにしてみました。
  </div>

  <div class="task">
    <input type="checkbox" id="t1">
    <label for="t1">
      机の上の書類を5枚だけ捨てる
      <span class="time">3分・片付け</span>
    </label>
    <div class="rx-group">
      <button type="button" class="rx" data-v="good">😊</button>
      <button type="button" class="rx" data-v="neutral">😐</button>
      <button type="button" class="rx" data-v="bad">😕</button>
    </div>
  </div>

  <div class="task">
    <input type="checkbox" id="t2">
    <label for="t2">
      気になっている単語をひとつ調べて語源をメモする
      <span class="time">10分・学び</span>
    </label>
    <div class="rx-group">
      <button type="button" class="rx" data-v="good">😊</button>
      <button type="button" class="rx" data-v="neutral">😐</button>
      <button type="button" class="rx" data-v="bad">😕</button>
    </div>
  </div>

  <div class="task">
    <input type="checkbox" id="t3">
    <label for="t3">
      冷蔵庫にある余り物で簡単な一品を作ってみる
      <span class="time">15分・料理</span>
    </label>
    <div class="rx-group">
      <button type="button" class="rx" data-v="good">😊</button>
      <button type="button" class="rx" data-v="neutral">😐</button>
      <button type="button" class="rx" data-v="bad">😕</button>
    </div>
  </div>

  <div class="task">
    <input type="checkbox" id="t4">
    <label for="t4">
      引き出しの中身をひとつだけ正しい場所に戻す
      <span class="time">1分・片付け</span>
    </label>
    <div class="rx-group">
      <button type="button" class="rx" data-v="good">😊</button>
      <button type="button" class="rx" data-v="neutral">😐</button>
      <button type="button" class="rx" data-v="bad">😕</button>
    </div>
  </div>

  <div class="task">
    <input type="checkbox" id="t5">
    <label for="t5">
      短歌をひとつ作ってノートに書く(7日間続けると一冊分になる)
      <span class="time">1日10分×7日・創作</span>
    </label>
    <div class="rx-group">
      <button type="button" class="rx" data-v="good">😊</button>
      <button type="button" class="rx" data-v="neutral">😐</button>
      <button type="button" class="rx" data-v="bad">😕</button>
    </div>
  </div>

  <div class="label-small">今日のひとこと(任意)</div>
  <textarea placeholder="今日感じたこと、気になったこと、要望など、なんでも"></textarea>

<script>
document.querySelectorAll('.rx').forEach(function(btn){
  btn.addEventListener('click', function(){
    var group = btn.parentElement.querySelectorAll('.rx');
    group.forEach(function(b){ b.classList.remove('selected'); });
    btn.classList.add('selected');
  });
});
</script>
</body>
</html>
